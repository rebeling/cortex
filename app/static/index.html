<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cortex — Memory Explorer</title>
  <meta name="description" content="Chat with your project memory and visualise the knowledge graph.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/vis-network@9.1.6/standalone/umd/vis-network.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0e12;
      --surface: #16161d;
      --surface2: #1e1e28;
      --border: #2a2a38;
      --text: #e4e4ed;
      --text-dim: #8888a0;
      --accent: #7c5cfc;
      --accent-glow: rgba(124, 92, 252, .25);
      --green: #2dd4a8;
      --red: #f06;
      --radius: 10px;
      --font: 'Inter', -apple-system, sans-serif;
    }
    html, body { height: 100%; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Top bar ─────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      padding: 0 24px;
      height: 52px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    header h1 {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      flex-shrink: 0;
    }

    /* ── Nav tabs in header, centered ──────────── */
    .nav-tabs {
      display: flex;
      gap: 2px;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }
    .nav-tab {
      padding: 14px 22px;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dim);
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: color .2s, border-color .2s;
    }
    .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .nav-tab:hover { color: var(--text); }

    .project-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
    }
    select, input, textarea {
      font-family: var(--font);
      font-size: 13px;
      color: var(--text);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 12px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    select:focus, input:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    select { cursor: pointer; min-width: 200px; }

    button {
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      padding: 8px 18px;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: transform .12s, box-shadow .2s, opacity .2s;
    }
    button:active { transform: scale(.96); }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #6344e0);
      color: #fff;
      box-shadow: 0 2px 12px var(--accent-glow);
    }
    .btn-primary:hover { box-shadow: 0 4px 20px var(--accent-glow); }
    .btn-secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { border-color: var(--accent); }
    .btn-green {
      background: linear-gradient(135deg, var(--green), #1aab88);
      color: #0e0e12;
    }
    button:disabled { opacity: .45; cursor: not-allowed; }

    /* ── Layout ──────────────────────────────────── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    .panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel-left {
      flex: 1;
      min-width: 380px;
    }
    .panel-left.has-graph { border-right: 1px solid var(--border); }
    .panel-right {
      flex: 1;
      min-width: 380px;
      position: relative;
    }
    .panel-right.hidden { display: none; }
    .panel-header {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-dim);
      padding: 14px 20px 10px;
      flex-shrink: 0;
    }

    .tab-content { display: none; flex: 1; overflow: hidden; flex-direction: column; }
    .tab-content.active { display: flex; }

    /* ── Bootstrap section ────────────────────────── */
    .section-box {
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 640px;
    }
    .section-box label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-dim);
    }
    .input-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .input-row input { flex: 1; }

    /* ── Dir picker ───────────────────────────────── */
    .dir-picker-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: var(--surface2);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-dim);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: border-color .2s, color .2s;
    }
    .dir-picker-btn:hover { border-color: var(--accent); color: var(--text); }
    .dir-picker-btn.selected { border-color: var(--green); color: var(--green); border-style: solid; }
    .dir-picker-hidden { display: none; }
    .dir-path-display {
      font-size: 12px;
      color: var(--text-dim);
      padding: 4px 0;
      word-break: break-all;
    }

    /* ── Push section ─────────────────────────────── */
    .push-area textarea { width: 100%; min-height: 80px; resize: vertical; }

    /* ── Chat section ─────────────────────────────── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg {
      max-width: 92%;
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 13px;
      line-height: 1.6;
      animation: msgIn .25s ease-out;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg-user {
      align-self: flex-end;
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 2px;
    }
    .msg-bot {
      align-self: flex-start;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-bottom-left-radius: 2px;
    }
    .msg-bot .memory-block {
      white-space: pre-wrap;
      margin-bottom: 8px;
    }
    .msg-bot .support-item {
      font-size: 12px;
      color: var(--text-dim);
      padding: 6px 0;
      border-top: 1px solid var(--border);
    }
    .msg-bot .support-item strong { color: var(--green); }
    .chat-input-bar {
      padding: 12px 20px;
      display: flex;
      gap: 8px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .chat-input-bar input { flex: 1; }

    /* ── Graph panel ──────────────────────────────── */
    .graph-toolbar {
      display: flex;
      gap: 8px;
      padding: 12px 20px;
      flex-shrink: 0;
    }
    #graph-canvas {
      flex: 1;
      background: var(--surface);
      border-radius: var(--radius);
      margin: 0 12px 12px;
    }
    .graph-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      color: var(--text-dim);
      font-size: 14px;
    }

    /* ── Toast ────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 20px;
      font-size: 13px;
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
      animation: toastIn .3s ease-out;
      z-index: 100;
    }
    .toast.success { border-color: var(--green); }
    .toast.error { border-color: var(--red); color: var(--red); }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Spinner ──────────────────────────────────── */
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Scrollbar ────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<!-- ── Header with centered nav ─────────────────── -->
<header style="position:relative;">
  <h1>⬡ Cortex</h1>
  <div class="nav-tabs">
    <button class="nav-tab active" data-tab="chat">Chat</button>
    <button class="nav-tab" data-tab="push">Push</button>
    <button class="nav-tab" data-tab="bootstrap">Bootstrap</button>
  </div>
  <div class="project-bar">
    <select id="project-select">
      <option value="">— select project —</option>
    </select>
    <button class="btn-secondary" onclick="loadProjects()" title="Refresh projects">↻</button>
  </div>
</header>

<!-- ── Main panels ──────────────────────────────── -->
<div class="main">
  <!-- Left panel -->
  <div class="panel panel-left has-graph" id="panel-left">

    <!-- Chat tab -->
    <div class="tab-content active" id="tab-chat">
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-input-bar">
        <input id="chat-input" type="text" placeholder="Ask about your project memory…" autocomplete="off" />
        <button class="btn-primary" id="chat-send" onclick="sendChat()">Send</button>
      </div>
    </div>

    <!-- Push tab -->
    <div class="tab-content" id="tab-push">
      <div class="section-box push-area">
        <label>Content to push into memory</label>
        <textarea id="push-content" placeholder="Paste or type content here…"></textarea>
        <label>Source type</label>
        <input id="push-source" type="text" value="agent_summary" />
        <label>File paths (comma-separated, optional)</label>
        <input id="push-files" type="text" placeholder="app/main.py, app/services/foo.py" />
        <button class="btn-green" onclick="pushMemory()">Push to Cortex</button>
      </div>
    </div>

    <!-- Bootstrap tab -->
    <div class="tab-content" id="tab-bootstrap">
      <div class="section-box">
        <label>Select a repository folder</label>
        <div class="input-row">
          <label class="dir-picker-btn" id="dir-picker-label">
            📂 Choose directory…
            <input type="file" webkitdirectory class="dir-picker-hidden" id="dir-picker" />
          </label>
          <span style="color:var(--text-dim);font-size:12px;">or</span>
          <input id="bootstrap-path" type="text" placeholder="/absolute/path/to/repo" style="flex:1;" />
        </div>
        <div class="dir-path-display" id="dir-path-display"></div>
        <button class="btn-primary" onclick="bootstrapProject()" style="align-self:flex-start;">Bootstrap Project</button>
        <div id="bootstrap-result" style="font-size:13px; color:var(--text-dim); white-space:pre-wrap;"></div>
      </div>
    </div>
  </div>

  <!-- Right panel: Knowledge Graph (shown only on Chat tab) -->
  <div class="panel panel-right" id="panel-right">
    <div class="panel-header">Knowledge Graph</div>
    <div class="graph-toolbar">
      <button class="btn-primary" onclick="loadGraph()">Load Graph</button>
    </div>
    <div id="graph-canvas"></div>
  </div>
</div>

<script>
const API = '';  // same origin

// ── Tab switching ─────────────────────────────────
const graphTabs = new Set(['chat']);  // tabs that show the graph panel

function switchTab(tabName) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.querySelector(`.nav-tab[data-tab="${tabName}"]`).classList.add('active');
  document.getElementById('tab-' + tabName).classList.add('active');

  const panelLeft = document.getElementById('panel-left');
  const panelRight = document.getElementById('panel-right');
  if (graphTabs.has(tabName)) {
    panelRight.classList.remove('hidden');
    panelLeft.classList.add('has-graph');
  } else {
    panelRight.classList.add('hidden');
    panelLeft.classList.remove('has-graph');
  }
}

document.querySelectorAll('.nav-tab').forEach(tab => {
  tab.addEventListener('click', () => switchTab(tab.dataset.tab));
});

// ── Dir picker ────────────────────────────────────
const dirPicker = document.getElementById('dir-picker');
const dirLabel = document.getElementById('dir-picker-label');
const dirDisplay = document.getElementById('dir-path-display');
const bootstrapPathInput = document.getElementById('bootstrap-path');

dirPicker.addEventListener('change', () => {
  if (dirPicker.files.length > 0) {
    // Extract directory path from first file's webkitRelativePath
    const firstPath = dirPicker.files[0].webkitRelativePath;
    const dirName = firstPath.split('/')[0];
    dirLabel.classList.add('selected');
    dirLabel.childNodes[0].textContent = '📂 ' + dirName;
    dirDisplay.textContent = 'Selected: ' + dirName + ' (' + dirPicker.files.length + ' files)';
    // Put the dir name in the path input so user can prepend their base path
    if (!bootstrapPathInput.value) {
      bootstrapPathInput.placeholder = 'Prepend the parent path, e.g. /Users/you/projects/' + dirName;
    }
  }
});

// ── Toast ─────────────────────────────────────────
function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ── Projects ──────────────────────────────────────
async function loadProjects() {
  try {
    const res = await fetch(API + '/projects');
    const data = await res.json();
    const sel = document.getElementById('project-select');
    const prev = sel.value;
    sel.innerHTML = '<option value="">— select project —</option>';
    data.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.id;
      opt.textContent = p.name + ' (' + p.id.slice(0, 8) + '…)';
      sel.appendChild(opt);
    });
    if (prev) sel.value = prev;
  } catch (e) {
    toast('Failed to load projects: ' + e.message, 'error');
  }
}
loadProjects();

function selectedProject() {
  const id = document.getElementById('project-select').value;
  if (!id) { toast('Select a project first', 'error'); return null; }
  return id;
}

// ── Chat ──────────────────────────────────────────
const chatInput = document.getElementById('chat-input');
chatInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendChat(); });

async function sendChat() {
  const pid = selectedProject();
  if (!pid) return;
  const query = chatInput.value.trim();
  if (!query) return;
  chatInput.value = '';

  addMsg(query, 'user');
  const loadId = addMsg('<span class="spinner"></span> Thinking…', 'bot', true);

  try {
    const res = await fetch(API + '/memory/context', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ project_id: pid, query, top_k: 6 }),
    });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    removeMsg(loadId);

    let html = '<div class="memory-block">' + escHtml(data.memory_block) + '</div>';
    if (data.supporting_items && data.supporting_items.length) {
      data.supporting_items.forEach(si => {
        html += '<div class="support-item"><strong>' + escHtml(si.item.title) + '</strong> — '
              + escHtml(si.item.content.slice(0, 200)) + '</div>';
      });
    }
    addMsg(html, 'bot', true);
  } catch (e) {
    removeMsg(loadId);
    addMsg('Error: ' + e.message, 'bot');
  }
}

function addMsg(content, who, isHtml) {
  const el = document.createElement('div');
  el.className = 'msg msg-' + (who === 'user' ? 'user' : 'bot');
  const id = 'msg-' + Date.now() + '-' + Math.random().toString(36).slice(2);
  el.id = id;
  if (isHtml) el.innerHTML = content; else el.textContent = content;
  const box = document.getElementById('chat-messages');
  box.appendChild(el);
  box.scrollTop = box.scrollHeight;
  return id;
}

function removeMsg(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── Push ──────────────────────────────────────────
async function pushMemory() {
  const pid = selectedProject();
  if (!pid) return;
  const content = document.getElementById('push-content').value.trim();
  if (!content) { toast('Content is empty', 'error'); return; }
  const sourceType = document.getElementById('push-source').value.trim() || 'agent_summary';
  const filePaths = document.getElementById('push-files').value
    .split(',').map(s => s.trim()).filter(Boolean);

  try {
    const res = await fetch(API + '/memory/ingest', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        project_id: pid,
        source_type: sourceType,
        content,
        file_paths: filePaths,
        metadata: { source: 'frontend' },
      }),
    });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    toast('Pushed ' + data.stored_items.length + ' item(s)');
    document.getElementById('push-content').value = '';
  } catch (e) {
    toast('Push failed: ' + e.message, 'error');
  }
}

// ── Bootstrap ─────────────────────────────────────
async function bootstrapProject() {
  const path = document.getElementById('bootstrap-path').value.trim();
  if (!path) { toast('Enter or select a repo path', 'error'); return; }
  const resultEl = document.getElementById('bootstrap-result');
  resultEl.innerHTML = '<span class="spinner"></span> Bootstrapping…';

  try {
    const res = await fetch(API + '/projects/bootstrap', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ repo_path: path }),
    });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    resultEl.textContent = '✓ Project: ' + data.project_id.slice(0, 8) + '…\n'
      + 'Stored memories: ' + data.stored_memory_count + '\n'
      + data.bootstrap_summary;
    toast('Bootstrap complete');
    loadProjects();
  } catch (e) {
    resultEl.textContent = '✗ ' + e.message;
    toast('Bootstrap failed', 'error');
  }
}

// ── Knowledge Graph ───────────────────────────────
let graphNetwork = null;

async function loadGraph() {
  const pid = selectedProject();
  if (!pid) return;
  const canvas = document.getElementById('graph-canvas');
  canvas.innerHTML = '<div class="graph-empty"><span class="spinner"></span> Loading graph…</div>';

  try {
    const res = await fetch(API + '/graph/' + pid);
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();

    if (!data.nodes.length) {
      canvas.innerHTML = '<div class="graph-empty">No graph data yet. Push some memory first, then load again.</div>';
      return;
    }

    const palette = [
      '#7c5cfc', '#2dd4a8', '#f06292', '#ffb74d', '#4fc3f7',
      '#aed581', '#ce93d8', '#ff8a65', '#80deea', '#e6ee9c',
    ];
    const nodeColors = {};
    let ci = 0;

    const nodes = new vis.DataSet(data.nodes.map(n => {
      if (!nodeColors[n.id]) nodeColors[n.id] = palette[ci++ % palette.length];
      return {
        id: n.id,
        label: n.label,
        color: {
          background: nodeColors[n.id],
          border: nodeColors[n.id],
          highlight: { background: '#fff', border: nodeColors[n.id] },
        },
        font: { color: '#e4e4ed', size: 12, face: 'Inter' },
        shape: 'dot', size: 18,
        shadow: { enabled: true, color: 'rgba(0,0,0,.4)', size: 8 },
      };
    }));

    const edges = new vis.DataSet(data.edges.map(e => ({
      from: e.from, to: e.to,
      label: e.label,
      color: { color: '#3a3a50', highlight: '#7c5cfc' },
      font: { color: '#6a6a80', size: 10, strokeWidth: 0, face: 'Inter' },
      arrows: { to: { enabled: true, scaleFactor: .6 } },
      smooth: { type: 'continuous' },
    })));

    canvas.innerHTML = '';
    graphNetwork = new vis.Network(canvas, { nodes, edges }, {
      physics: {
        solver: 'forceAtlas2Based',
        forceAtlas2Based: { gravitationalConstant: -60, springLength: 120 },
        stabilization: { iterations: 150 },
      },
      interaction: { hover: true, tooltipDelay: 100, zoomView: true },
      layout: { improvedLayout: true },
    });

    toast('Graph loaded — ' + data.nodes.length + ' nodes, ' + data.edges.length + ' edges');
  } catch (e) {
    canvas.innerHTML = '<div class="graph-empty">Error: ' + e.message + '</div>';
    toast('Graph load failed', 'error');
  }
}
</script>
</body>
</html>
